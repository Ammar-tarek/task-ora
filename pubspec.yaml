name: task_ora
description: "TaskOra Operations Dashboard"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.0

  # Navigation
  go_router: ^14.0.0

  # Backend
  supabase_flutter: ^2.8.0

  # State management
  provider: ^6.1.2

  # n8n / webhook integration
  http: ^1.2.2
  shared_preferences: ^2.3.2

  # WiFi auto-attendance
  connectivity_plus: ^6.0.5
  network_info_plus: ^6.1.0

  # Profile picture picking
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# App launcher icon (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  # Android adaptive icon: full-bleed logo background, transparent foreground.
  adaptive_icon_background: "assets/app_icon.png"
  adaptive_icon_foreground: "assets/app_icon_fg.png"
  web:
    generate: true
    image_path: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/logo.png
